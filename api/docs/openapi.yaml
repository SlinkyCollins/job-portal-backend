openapi: 3.1.0
info:
  title: JobNet Backend API
  version: 0.1.0
  description: |
    Initial OpenAPI documentation for core JobNet flows.
    Includes Auth, Jobs, and Job Seeker profile update endpoints.

servers:
  - url: /
    description: Current host
  - url: https://jobnet.vercel.app
    description: Production

tags:
  - name: Auth
    description: Authentication and session endpoints
  - name: Jobs
    description: Public and authenticated job endpoints
  - name: Seeker Profile
    description: Job seeker profile management
  - name: Admin Dashboard
    description: Admin-only management endpoints
  - name: Employer Dashboard
    description: Employer dashboard and job management endpoints
  - name: Shared Settings
    description: Shared account and settings endpoints for authenticated users

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ApiResponseBase:
      type: object
      properties:
        status:
          type: boolean
        msg:
          type: string
      required: [status]

    ValidationErrors:
      type: object
      additionalProperties:
        type: array
        items:
          type: string

    LoginRequest:
      type: object
      properties:
        mail:
          type: string
          format: email
          example: seeker@example.com
        pword:
          type: string
          format: password
          example: StrongPassword123!
      required: [mail, pword]

    SignupRequest:
      type: object
      properties:
        fname:
          type: string
          example: Ada
        lname:
          type: string
          example: Lovelace
        mail:
          type: string
          format: email
          example: ada@example.com
        pword:
          type: string
          format: password
          example: StrongPassword123!
        role:
          type: string
          enum: [job_seeker, employer]
          example: job_seeker
        terms:
          oneOf:
            - type: boolean
            - type: integer
          example: true
      required: [fname, lname, mail, pword, role, terms]

    SocialLoginRequest:
      type: object
      properties:
        token:
          type: string
          description: Firebase ID token
        photoURL:
          type: string
          format: uri
          nullable: true
      required: [token]

    UserSummary:
      type: object
      properties:
        user_id:
          type: integer
        role:
          type: string
          example: job_seeker
        email:
          type: string
          format: email

    LoginPayload:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: '#/components/schemas/UserSummary'

    JobCard:
      type: object
      properties:
        job_id:
          type: integer
        title:
          type: string
        location:
          type: string
        salary_amount:
          type: number
        currency:
          type: string
          example: USD
        salary_duration:
          type: string
          example: monthly
        published_at:
          type: string
          format: date-time
        employment_type:
          type: string
        experience_level:
          type: string
        category_name:
          type: string
        company_id:
          type: integer
        company_name:
          type: string
        company_logo:
          type: string
          nullable: true
        tags:
          type: array
          items:
            type: string
        isSaved:
          type: boolean

    JobsListData:
      type: object
      properties:
        jobs:
          type: array
          items:
            $ref: '#/components/schemas/JobCard'
        total:
          type: integer
        page:
          type: integer
        per_page:
          type: integer
        total_pages:
          type: integer

    JobDetailsData:
      type: object
      properties:
        job:
          type: object
          additionalProperties: true
          description: Full job payload from jobs and company join

    UpdateSeekerProfileRequest:
      type: object
      properties:
        fullname:
          type: string
          example: Jane Doe
        phone:
          type: string
          example: "+14155552671"
        bio:
          type: string
          nullable: true
        address:
          type: string
        country:
          type: string
          description: ISO 3166-1 alpha-2 code
          example: US
        linked_providers:
          type: string
          nullable: true
          description: JSON-encoded array string for account linking
          example: "[\"google\",\"facebook\"]"
      required: [fullname, phone, address, country]

    WishlistRequest:
      type: object
      properties:
        jobId:
          type: integer
          example: 101
      required: [jobId]

paths:
  /api/auth/signup.php:
    post:
      tags: [Auth]
      summary: Register a new user account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignupRequest'
      responses:
        '201':
          description: Signup successful
          content:
            application/json:
              example:
                status: true
                msg: User signed up successfully.
        '400':
          description: Validation failed
          content:
            application/json:
              example:
                status: false
                msg: Validation failed.
                errors:
                  email:
                    - Email must be a valid email address.
                  password:
                    - Password must be at least 8 characters.
        '409':
          description: Email already exists or social-account collision
          content:
            application/json:
              example:
                status: false
                msg: Email already exists.
        '500':
          description: Server error
          content:
            application/json:
              example:
                status: false
                msg: Sign up failed. Please try again later.

  /api/auth/login.php:
    post:
      tags: [Auth]
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponseBase'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/LoginPayload'
              example:
                status: true
                msg: Login successful.
                data:
                  token: <JWT_TOKEN>
                  user:
                    user_id: 42
                    role: job_seeker
                    email: seeker@example.com
        '400':
          description: Validation failed
          content:
            application/json:
              example:
                status: false
                msg: Validation failed.
                errors:
                  email:
                    - Email is required.
        '401':
          description: Incorrect password
          content:
            application/json:
              example:
                status: false
                msg: Incorrect password.
        '403':
          description: Account suspended
          content:
            application/json:
              example:
                status: false
                msg: Your account has been suspended. Please contact support.
        '404':
          description: User not found
          content:
            application/json:
              example:
                status: false
                msg: User not found. Please try signing up.
        '500':
          description: Server configuration or login error
          content:
            application/json:
              example:
                status: false
                msg: Server configuration error.

  /api/auth/logout.php:
    post:
      tags: [Auth]
      summary: Logout current user client-side session
      responses:
        '200':
          description: Logged out successfully
          content:
            application/json:
              example:
                status: true
                msg: Logged out successfully.

  /api/auth/social_login.php:
    post:
      tags: [Auth]
      summary: Login with Firebase social token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SocialLoginRequest'
      responses:
        '200':
          description: Login successful or new user continuation response
          content:
            application/json:
              examples:
                existingUser:
                  summary: Existing linked user login
                  value:
                    status: true
                    msg: Login successful.
                    data:
                      token: <JWT_TOKEN>
                      user:
                        user_id: 57
                        role: employer
                        email: founder@example.com
                newUserContinuation:
                  summary: New social user continues registration
                  value:
                    status: false
                    msg: User account not found. Continue registration.
                    data:
                      newUser: true
                      token: <FIREBASE_ID_TOKEN>
        '400':
          description: No token provided
          content:
            application/json:
              example:
                status: false
                msg: No token provided.
        '401':
          description: Invalid token
          content:
            application/json:
              example:
                status: false
                msg: Invalid token.
        '403':
          description: Account suspended
          content:
            application/json:
              example:
                status: false
                msg: Your account has been suspended. Please contact support.
        '500':
          description: Server configuration error
          content:
            application/json:
              example:
                status: false
                msg: Server configuration error.

  /api/jobs/all_jobs.php:
    get:
      tags: [Jobs]
      summary: List active jobs with filtering and pagination
      security:
        - BearerAuth: []
        - {}
      parameters:
        - name: location
          in: query
          schema:
            type: string
        - name: category
          in: query
          schema:
            type: integer
        - name: keyword
          in: query
          schema:
            type: string
        - name: sort
          in: query
          schema:
            type: string
            enum: [datePosted, relevance, salaryLowToHigh, salaryHighToLow]
            default: datePosted
        - name: employment_type
          in: query
          description: Comma-separated values or repeated query params
          schema:
            oneOf:
              - type: string
                example: full-time,remote
              - type: array
                items:
                  type: string
        - name: experience_level
          in: query
          description: Comma-separated values or repeated query params
          schema:
            oneOf:
              - type: string
                example: junior,mid
              - type: array
                items:
                  type: string
        - name: tags
          in: query
          schema:
            type: array
            items:
              type: string
        - name: currency
          in: query
          schema:
            type: string
            example: USD
        - name: min_salary
          in: query
          schema:
            type: integer
        - name: max_salary
          in: query
          schema:
            type: integer
        - name: salary_duration
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: Jobs retrieved or no jobs found
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponseBase'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/JobsListData'
              examples:
                jobsFound:
                  summary: At least one job found
                  value:
                    status: true
                    msg: Jobs retrieved successfully
                    data:
                      jobs:
                        - job_id: 101
                          title: Backend PHP Developer
                          location: Remote
                          salary_amount: 4000
                          currency: USD
                          salary_duration: monthly
                          published_at: 2026-04-10T10:22:00Z
                          employment_type: full-time
                          experience_level: mid
                          category_name: Engineering
                          company_id: 8
                          company_name: Talent Forge
                          company_logo: https://cdn.example.com/logo.png
                          tags: [PHP, MySQL, REST]
                          isSaved: false
                      total: 1
                      page: 1
                      per_page: 10
                      total_pages: 1
                noJobs:
                  summary: No jobs matched filters
                  value:
                    status: false
                    msg: No jobs found
                    data:
                      status: false
                      msg: No jobs found

  /api/jobs/jobdetails.php:
    get:
      tags: [Jobs]
      summary: Get full job details by job id
      security:
        - BearerAuth: []
        - {}
      parameters:
        - name: id
          in: query
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Job details retrieved
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponseBase'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/JobDetailsData'
              example:
                status: true
                msg: Job details retrieved successfully.
                data:
                  job:
                    job_id: 101
                    title: Backend PHP Developer
                    overview: Build and maintain backend APIs.
                    description: You will own endpoint delivery and integrations.
                    location: Remote
                    salary_amount: 4000
                    currency: USD
                    salary_duration: monthly
                    hasApplied: false
                    isSaved: true
                    isRetracted: false
                    is_closed: false
                    company_name: Talent Forge
                    website: https://talentforge.example
        '400':
          description: Job id missing
          content:
            application/json:
              example:
                status: false
                msg: Job ID is required.
        '404':
          description: Job not found
          content:
            application/json:
              example:
                status: false
                msg: Job not found

  /api/jobs/apply.php:
    post:
      tags: [Jobs]
      summary: Submit a job application (requires job seeker JWT)
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                jobId:
                  type: integer
                cover_letter:
                  type: string
                  nullable: true
                cv_file:
                  type: string
                  format: binary
                  description: Optional PDF or DOCX (max 10MB)
              required: [jobId]
      responses:
        '201':
          description: Application submitted
          content:
            application/json:
              example:
                status: true
                msg: Application submitted successfully!
                data:
                  hasApplied: true
        '400':
          description: Invalid input, duplicate apply, missing CV, or job closed
          content:
            application/json:
              examples:
                duplicate:
                  summary: Already applied
                  value:
                    status: false
                    msg: You have already applied for this job.
                    data:
                      hasApplied: true
                jobClosed:
                  summary: Job no longer accepting applications
                  value:
                    status: false
                    msg: This job is closed or expired and no longer accepting applications.
                noCv:
                  summary: No uploaded CV available
                  value:
                    status: false
                    msg: No CV available. Please upload a CV in your dashboard first.
        '401':
          description: Unauthorized
          content:
            application/json:
              example:
                status: false
                msg: Unauthorized access.
        '500':
          description: Upload or server error
          content:
            application/json:
              example:
                status: false
                msg: Failed to submit application. Please try again later.

  /api/jobs/wishlist.php:
    post:
      tags: [Jobs]
      summary: Save a job to seeker wishlist
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WishlistRequest'
      responses:
        '200':
          description: Added to wishlist
          content:
            application/json:
              example:
                status: true
                msg: Added to Wishlist!
                data:
                  isSaved: true
        '400':
          description: Missing jobId or duplicate save
          content:
            application/json:
              examples:
                missingJobId:
                  summary: jobId omitted
                  value:
                    status: false
                    msg: Job ID is required.
                duplicate:
                  summary: Already saved
                  value:
                    status: false
                    msg: You have already saved this job.
        '401':
          description: Unauthorized
          content:
            application/json:
              example:
                status: false
                msg: Unauthorized access.

  /api/jobs/wishlist_delete.php:
    delete:
      tags: [Jobs]
      summary: Remove a job from seeker wishlist
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WishlistRequest'
      responses:
        '200':
          description: Removed from wishlist
          content:
            application/json:
              example:
                status: true
                msg: Removed from Wishlist!
                data:
                  isSaved: false
        '400':
          description: Missing jobId
          content:
            application/json:
              example:
                status: false
                msg: Job ID is required.
        '401':
          description: Unauthorized
          content:
            application/json:
              example:
                status: false
                msg: Unauthorized access.

  /api/dashboard/seeker/update_profile.php:
    post:
      tags: [Seeker Profile]
      summary: Update seeker profile or linked providers
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/UpdateSeekerProfileRequest'
                - type: object
                  properties:
                    linked_providers:
                      type: string
                      description: JSON string array for partial linked-account update
                      example: "[\"google\"]"
                  required: [linked_providers]
      responses:
        '200':
          description: Profile updated successfully
          content:
            application/json:
              examples:
                fullProfileUpdate:
                  summary: Full profile update successful
                  value:
                    status: true
                    msg: Profile updated successfully.
                linkedProvidersOnly:
                  summary: Linked providers only update
                  value:
                    status: true
                    msg: Linked providers updated successfully.
        '400':
          description: Validation failed
          content:
            application/json:
              example:
                status: false
                msg: Validation failed.
                errors:
                  fullname:
                    - Full name must include a first and last name separated by a space.
                  country:
                    - Invalid country code.
        '401':
          description: Unauthorized
          content:
            application/json:
              example:
                status: false
                msg: Unauthorized access.
        '405':
          description: Invalid request method
          content:
            application/json:
              example:
                status: false
                msg: Invalid request method.
        '500':
          description: Server or config error
          content:
            application/json:
              examples:
                profileUpdateFailed:
                  summary: Database update failed
                  value:
                    status: false
                    msg: Profile update failed.
                configMissing:
                  summary: Country config missing
                  value:
                    status: false
                    msg: Country validation config is missing or invalid.

  /api/dashboard/admin/admin_dashboard.php:
    get:
      tags: [Admin Dashboard]
      summary: Load current admin profile data
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Admin dashboard loaded
          content:
            application/json:
              example:
                status: true
                msg: Admin dashboard loaded successfully.
                data:
                  user:
                    user_id: 1
                    first_name: Super
                    last_name: Admin
                    email: admin@example.com
                    role: admin
        '401':
          description: Unauthorized
        '404':
          description: User data missing

  /api/dashboard/admin/get_stats.php:
    get:
      tags: [Admin Dashboard]
      summary: Get platform statistics
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Stats retrieved
          content:
            application/json:
              example:
                status: true
                msg: Stats retrieved successfully
                data:
                  total_users: 248
                  job_seekers: 198
                  employers: 49
                  total_jobs: 381
                  applications: 956
        '500':
          description: Server error

  /api/dashboard/admin/get_users.php:
    get:
      tags: [Admin Dashboard]
      summary: List users excluding current admin
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Users retrieved
          content:
            application/json:
              example:
                status: true
                msg: Users retrieved successfully.
                data:
                  users:
                    - user_id: 77
                      first_name: Jane
                      last_name: Doe
                      email: jane@example.com
                      role: employer
                      created_at: 2026-03-01T09:12:00Z
                      suspended: 0
                      job_count: 3

  /api/dashboard/admin/get_jobs.php:
    get:
      tags: [Admin Dashboard]
      summary: List all jobs with optional status filter
      security:
        - BearerAuth: []
      parameters:
        - name: status
          in: query
          description: Filter by status or use all
          schema:
            type: string
            enum: [all, active, pending, closed]
            default: all
      responses:
        '200':
          description: Jobs retrieved
          content:
            application/json:
              example:
                status: true
                msg: Jobs retrieved successfully.
                data:
                  jobs:
                    - job_id: 15
                      job_title: Backend Developer
                      job_type: full-time
                      location: Remote
                      status: active
                      created_at: 2026-04-11T10:22:00Z
                      company_name: Talent Forge
                      first_name: Musa
                      last_name: Ibrahim
                      application_count: 14

  /api/dashboard/admin/get_categories.php:
    get:
      tags: [Admin Dashboard]
      summary: List categories with active job counts
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Categories retrieved
          content:
            application/json:
              example:
                status: true
                msg: Categories retrieved successfully.
                data:
                  categories:
                    - id: 1
                      name: Engineering
                      job_count: 28

  /api/dashboard/admin/add_category.php:
    post:
      tags: [Admin Dashboard]
      summary: Create a new category
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: Product Design
              required: [name]
      responses:
        '201':
          description: Category created
          content:
            application/json:
              example:
                status: true
                msg: Category added successfully
        '400':
          description: Missing category name
        '409':
          description: Duplicate category

  /api/dashboard/admin/update_category.php:
    post:
      tags: [Admin Dashboard]
      summary: Update a category name
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: integer
                  example: 3
                name:
                  type: string
                  example: Growth Marketing
              required: [id, name]
      responses:
        '200':
          description: Category updated
          content:
            application/json:
              example:
                status: true
                msg: Category updated successfully
        '400':
          description: Missing fields
        '409':
          description: Duplicate category name

  /api/dashboard/admin/delete_category.php:
    post:
      tags: [Admin Dashboard]
      summary: Delete a category
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: integer
                  example: 5
              required: [id]
      responses:
        '200':
          description: Category deleted
          content:
            application/json:
              example:
                status: true
                msg: Category deleted successfully
        '400':
          description: Category ID required

  /api/dashboard/admin/delete_job.php:
    post:
      tags: [Admin Dashboard]
      summary: Delete any job by id
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                job_id:
                  type: integer
                  example: 44
              required: [job_id]
      responses:
        '200':
          description: Job deleted
          content:
            application/json:
              example:
                status: true
                msg: Job deleted successfully
        '400':
          description: Job ID required
          content:
            application/json:
              example:
                status: false
                msg: Job ID required

  /api/dashboard/admin/delete_user.php:
    post:
      tags: [Admin Dashboard]
      summary: Delete user and associated assets
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                user_id:
                  type: integer
                  example: 91
              required: [user_id]
      responses:
        '200':
          description: User deleted
          content:
            application/json:
              example:
                status: true
                msg: User and all associated data deleted successfully.
        '403':
          description: Cannot delete admin
        '404':
          description: User not found
        '500':
          description: Deletion failure

  /api/dashboard/admin/suspend_user.php:
    post:
      tags: [Admin Dashboard]
      summary: Suspend or unsuspend a user
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                user_id:
                  type: integer
                  example: 21
                action:
                  type: string
                  enum: [suspend, unsuspend]
                  example: suspend
              required: [user_id, action]
      responses:
        '200':
          description: User suspension state updated
          content:
            application/json:
              examples:
                suspended:
                  value:
                    status: true
                    msg: User suspended successfully
                unsuspended:
                  value:
                    status: true
                    msg: User unsuspended successfully
        '400':
          description: Invalid request
          content:
            application/json:
              example:
                status: false
                msg: Invalid request
        '403':
          description: Cannot suspend admin
          content:
            application/json:
              example:
